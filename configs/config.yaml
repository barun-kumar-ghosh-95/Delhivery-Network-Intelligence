# Project Configuration
project:
  name: "Delhivery ETA Graph Intelligence"
  version: "1.0.0"
  data_path: "delivery_data.csv"

# Data Processing
data:
  train_test_column: "data"
  train_value: "training"
  test_value: "test"
  target_column: "actual_time"
  trip_id_column: "trip_uuid"
  
  # Leaky columns - NEVER use as features
  leaky_columns:
    - "od_end_time"
    - "actual_time"
    - "start_scan_to_end_scan"
    - "factor"
    - "segment_factor"
    - "segment_actual_time"
    - "actual_distance_to_destination"
    - "cutoff_factor"
  
  # ID columns - for grouping only
  id_columns:
    - "data"
    - "trip_uuid"
    - "route_schedule_uuid"

# Graph Configuration
graph:
  node_id_columns:
    source: "source_center"
    destination: "destination_center"
  node_name_columns:
    source: "source_name"
    destination: "destination_name"
  
  # Node2Vec parameters
  node2vec:
    dimensions: 64
    walk_length: 30
    num_walks: 200
    p: 1.0
    q: 2.0
    workers: 4
    window: 10
    min_count: 1
    batch_words: 4

# Model Configuration
models:
  random_state: 42
  test_size: 0.2
  cv_folds: 5
  
  # Delay classification thresholds
  delay_classes:
    healthy: 1.3
    moderate: 2.0
    severe: 3.0

# Dashboard
dashboard:
  title: "Delhivery Network Intelligence"
  theme: "dark"
  port: 8501
